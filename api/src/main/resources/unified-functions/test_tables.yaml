# Test table definitions for unified function E2E testing.
# Used by the Rust test harness to create DataFusion MemTables with sample data.

tables:
  logs:
    columns:
      - { name: id, type: INTEGER }
      - { name: timestamp, type: TIMESTAMP }
      - { name: level, type: STRING }
      - { name: message, type: STRING }
      - { name: ip, type: STRING }
      - { name: payload, type: STRING }
      - { name: status_code, type: INTEGER }
      - { name: latency, type: DOUBLE }
      - { name: is_error, type: BOOLEAN }
    sample_data:
      - [1, "2024-01-15T08:23:45Z", "INFO", "Request processed successfully", "192.168.1.10", '{"action":"login","user":"alice"}', 200, 12.5, false]
      - [2, "2024-01-15T08:24:01Z", "ERROR", "Connection timeout to upstream", "10.0.0.55", '{"retry":3,"service":"auth"}', 504, 30000.0, true]
      - [3, "2024-01-15T08:25:12Z", "WARN", "High memory usage detected", "172.16.0.1", '{"mem_pct":92.4,"host":"node-3"}', 200, 45.2, false]
      - [4, "2024-01-15T08:26:30Z", "DEBUG", "Cache miss for key user:99", "::1", '{"cache":"redis","ttl":300}', 200, 3.1, false]
      - [5, "2024-01-15T08:27:55Z", "ERROR", "Null pointer in handler", "2001:db8::ff00:42:8329", '{"stack":"NullPointerException at line 42"}', 500, 1.8, true]
      - [6, "2024-01-15T08:28:10Z", "INFO", "Batch job completed", "192.168.1.10", '{"records":1500,"duration_ms":8700}', 200, 8700.0, false]
      - [7, "2024-01-15T08:30:00Z", "WARN", "Rate limit approaching threshold", "fe80::1%25eth0", '{"current_rps":480,"limit":500}', 429, 0.5, false]

  employees:
    columns:
      - { name: id, type: INTEGER }
      - { name: name, type: STRING }
      - { name: department, type: STRING }
      - { name: salary, type: DOUBLE }
      - { name: hire_date, type: DATE }
      - { name: is_active, type: BOOLEAN }
      - { name: age, type: INTEGER }
      - { name: email, type: STRING }
    sample_data:
      - [1, "Alice", "Engineering", 105000.00, "2019-03-15", true, 32, "alice@example.com"]
      - [2, "Bob", "Marketing", 78000.50, "2020-07-01", true, 28, "bob@example.com"]
      - [3, "Charlie", "Engineering", 120000.00, "2017-11-20", true, 40, "charlie@example.com"]
      - [4, "Diana", "HR", 85000.00, "2021-01-10", true, 35, "diana@example.com"]
      - [5, "Eve", "Finance", 95000.75, "2018-06-30", false, 45, "eve@example.com"]
      - [6, "Frank", "Engineering", 70000.00, "2023-09-05", true, 24, "frank@example.com"]
