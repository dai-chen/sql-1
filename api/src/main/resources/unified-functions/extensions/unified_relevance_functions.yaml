    impls:
      - args:
          - value: "string"
            name: "fields"
            description: "Comma-separated list of fields to search"
          - value: "string"
            name: "query"
            description: "The simple query string"
        return: "boolean"

  - name: query_string
    description: >-
      Full query string syntax.
    metadata:
      null_handling: "ACCEPT_NULLS"
      pushdown_only: true
