        - "null args -> null"
      ai_hints:
        platform_hints:
          datafusion:
            crates: []
            notes: "Pushdown to OpenSearch only, NOT evaluable as UDF, fields is comma-separated"
    impls:
      - args:
          - value: "string"
            name: "fields"
            description: "Comma-separated list of fields to match against"
          - value: "string"
            name: "query"
            description: "The query text"
        return: "boolean"

  - name: simple_query_string
