    impls:
      - args:
          - value: "string"
            name: "field"
            description: "The field to match against"
          - value: "string"
            name: "query"
            description: "The phrase prefix to match"
        return: "boolean"

  - name: multi_match
    description: >-
      Multi-field match query.
