// Creates test cluster with 3 nodes of the old version.
task "${baseName}#oldVersionClusterTask"(type: StandaloneRestIntegTestTask) {
    useCluster testClusters."${baseName}"
    filter {
        includeTestsMatching "org.opensearch.sql.bwc.*IT"
    }
    systemProperty 'tests.rest.bwcsuite', 'old_cluster'
    systemProperty 'tests.rest.bwcsuite_round', 'old'
    systemProperty 'tests.plugin_bwc_version', bwcVersion
    nonInputProperties.systemProperty('tests.rest.cluster', "${-> testClusters."${baseName}".allHttpSocketURI.join(",")}")
    nonInputProperties.systemProperty('tests.clustername', "${-> testClusters."${baseName}".getName()}")
}

// Upgrade one node of the old cluster to new OpenSearch version with upgraded plugin version.
// This results in a mixed cluster with 2 nodes on the old version and 1 upgraded node.
// This is also used as a one third upgraded cluster for a rolling upgrade.
task "${baseName}#mixedClusterTask"(type: StandaloneRestIntegTestTask) {
    useCluster testClusters."${baseName}"
    dependsOn "${baseName}#oldVersionClusterTask"
    doFirst {
        testClusters."${baseName}".upgradeNodeAndPluginToNextVersion(plugins)
    }
    filter {
        includeTestsMatching "org.opensearch.sql.bwc.*IT"
    }
    systemProperty 'tests.rest.bwcsuite', 'mixed_cluster'
    systemProperty 'tests.rest.bwcsuite_round', 'first'
    systemProperty 'tests.plugin_bwc_version', bwcVersion
    nonInputProperties.systemProperty('tests.rest.cluster', "${-> testClusters."${baseName}".allHttpSocketURI.join(",")}")
    nonInputProperties.systemProperty('tests.clustername', "${-> testClusters."${baseName}".getName()}")
}

// Upgrade the second node to new OpenSearch version with upgraded plugin version after the first node is upgraded.
// This results in a mixed cluster with 1 node on the old version and 2 upgraded nodes.
// This is used for rolling upgrade.
task "${baseName}#twoThirdsUpgradedClusterTask"(type: StandaloneRestIntegTestTask) {
    dependsOn "${baseName}#mixedClusterTask"
    useCluster testClusters."${baseName}"
    doFirst {
        testClusters."${baseName}".upgradeNodeAndPluginToNextVersion(plugins)
    }
    filter {
        includeTestsMatching "org.opensearch.sql.bwc.*IT"
    }
    systemProperty 'tests.rest.bwcsuite', 'mixed_cluster'
    systemProperty 'tests.rest.bwcsuite_round', 'second'
    systemProperty 'tests.plugin_bwc_version', bwcVersion
    nonInputProperties.systemProperty('tests.rest.cluster', "${-> testClusters."${baseName}".allHttpSocketURI.join(",")}")
    nonInputProperties.systemProperty('tests.clustername', "${-> testClusters."${baseName}".getName()}")
}

// Upgrade the third node to new OpenSearch version with upgraded plugin version after the second node is upgraded.
// This results in a fully upgraded cluster.
// This is used for rolling upgrade.
task "${baseName}#rollingUpgradeClusterTask"(type: StandaloneRestIntegTestTask) {
    dependsOn "${baseName}#twoThirdsUpgradedClusterTask"
    useCluster testClusters."${baseName}"
    doFirst {
        testClusters."${baseName}".upgradeNodeAndPluginToNextVersion(plugins)
    }
    filter {
        includeTestsMatching "org.opensearch.sql.bwc.*IT"
    }
    mustRunAfter "${baseName}#mixedClusterTask"
    systemProperty 'tests.rest.bwcsuite', 'mixed_cluster'
    systemProperty 'tests.rest.bwcsuite_round', 'third'
    systemProperty 'tests.plugin_bwc_version', bwcVersion
    nonInputProperties.systemProperty('tests.rest.cluster', "${-> testClusters."${baseName}".allHttpSocketURI.join(",")}")
    nonInputProperties.systemProperty('tests.clustername', "${-> testClusters."${baseName}".getName()}")
}

// Upgrade all the nodes of the old cluster to new OpenSearch version with upgraded plugin version
// at the same time resulting in a fully upgraded cluster.
task "${baseName}#fullRestartClusterTask"(type: StandaloneRestIntegTestTask) {
    dependsOn "${baseName}#oldVersionClusterTask"
    useCluster testClusters."${baseName}"
    doFirst {
        testClusters."${baseName}".upgradeAllNodesAndPluginsToNextVersion(plugins)
    }
    filter {
        includeTestsMatching "org.opensearch.sql.bwc.*IT"
    }
    systemProperty 'tests.rest.bwcsuite', 'upgraded_cluster'
    systemProperty 'tests.plugin_bwc_version', bwcVersion
    nonInputProperties.systemProperty('tests.rest.cluster', "${-> testClusters."${baseName}".allHttpSocketURI.join(",")}")
    nonInputProperties.systemProperty('tests.clustername', "${-> testClusters."${baseName}".getName()}")
}

// A bwc test suite which runs all the bwc tasks in rolling upgrade
task bwcTestRollingUpgradeSuite(type: StandaloneRestIntegTestTask) {
    testLogging {
        events "passed", "skipped", "failed"
    }
    exclude '**/*Test*'
    exclude '**/*IT*'
    dependsOn tasks.named("${baseName}#mixedClusterTask")
    dependsOn tasks.named("${baseName}#rollingUpgradeClusterTask")
}

// A bwc test suite which runs all the bwc tasks in full restart
task bwcTestFullRestartSuite(type: StandaloneRestIntegTestTask) {
    testLogging {
        events "passed", "skipped", "failed"
    }
    exclude '**/*Test*'
    exclude '**/*IT*'
    dependsOn tasks.named("${baseName}#fullRestartClusterTask")
}

def opensearch_tmp_dir = rootProject.file('build/private/es_tmp').absoluteFile
opensearch_tmp_dir.mkdirs()

spotless {
    java {
        target fileTree('.') {
            include '**/*.java'
            exclude '**/build/**', '**/build-*/**'
        }
        importOrder()
        licenseHeader("/*\n" +
                " * Copyright OpenSearch Contributors\n" +
                " * SPDX-License-Identifier: Apache-2.0\n" +
                " */\n\n")
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
        googleJavaFormat('1.32.0').reflowLongStrings().groupArtifact('com.google.googlejavaformat:google-java-format')
    }
}

task integTestRemote(type: RestIntegTestTask) {
    testLogging {
        events "passed", "skipped", "failed"
    }
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    systemProperty 'tests.security.manager', 'false'
    systemProperty('project.root', project.projectDir.absolutePath)
    systemProperty 'java.io.tmpdir', opensearch_tmp_dir.absolutePath

    systemProperty "https", System.getProperty("https")
    systemProperty "user", System.getProperty("user")
    systemProperty "password", System.getProperty("password")

    // Set default query size limit
    systemProperty 'defaultQuerySizeLimit', '10000'

    if (System.getProperty("tests.rest.bwcsuite") == null) {
        filter {
            excludeTestsMatching "org.opensearch.sql.bwc.*IT"
        }
    }

    // Exclude the same tests that are excluded for integTest
    exclude 'org/opensearch/sql/doctest/**/*IT.class'
    exclude 'org/opensearch/sql/correctness/**'
    exclude 'org/opensearch/sql/legacy/ExplainIT.class'
    exclude 'org/opensearch/sql/legacy/PrettyFormatterIT.class'
    exclude 'org/opensearch/sql/legacy/TermQueryExplainIT.class'
    exclude 'org/opensearch/sql/legacy/QueryAnalysisIT.class'
    exclude 'org/opensearch/sql/legacy/OrderIT.class'
    exclude 'org/opensearch/sql/jdbc/**'
}

// =============================================================================
// Analytics-engine compatibility reports (PPL + SQL)
//
// Runs every PPL/SQL IT through the analytics-engine path against an
// externally-managed cluster (started with the analytics-engine plugin set
// installed), then post-processes the JUnit XMLs into a markdown coverage
// report bucketed by exception type, normalized error message, and Origin
// (SQL plugin / analytics engine / Calcite library / OpenSearch / Test)
// recovered from the cluster log's first server-side stack frame.
//
// End-to-end usage:
//
//   1. Start an OpenSearch node with the analytics-engine plugin set
//      installed and the SQL plugin built locally.
//
//   2. Run one or both:
//        ./gradlew :integ-test:analyticsCompatibilityReport \
//            -Dtests.rest.cluster=localhost:9200 \
//            -Dtests.cluster=localhost:9300 \
//            -Dtests.clustername=runTask
//
//        ./gradlew :integ-test:analyticsSqlCompatibilityReport \
//            -Dtests.rest.cluster=localhost:9200 \
//            -Dtests.cluster=localhost:9300 \
//            -Dtests.clustername=runTask
//
//   3. Read the report at:
//        integ-test/build/reports/analytics-compatibility/REPORT.md       (PPL)
//        integ-test/build/reports/analytics-sql-compatibility/REPORT.md   (SQL)
//
// Both test tasks always succeed (`ignoreFailures = true`) so the report is
// produced even when the analytics path can't yet handle a command — failures
// are the signal we're after, not a build break.
//
// How the test-side hook works (PPLIntegTestCase.java / SQLIntegTestCase.java):
//   - The test tasks set `-Dtests.analytics.force_routing=true`.
//   - {PPL,SQL}IntegTestCase.init() reads that property and calls
//     enableAnalyticsForceRouting() during setup, which flips the cluster
//     setting plugins.calcite.analytics.force_routing=true.
//   - RestUnifiedQueryAction.isAnalyticsIndex() honors that setting and
//     returns true unconditionally — so every query routes through the
//     analytics-engine planner regardless of index name.
//
// Configuration & rendering logic is shared via two ext closures defined at the
// top of this file: configureAnalyticsCompatibilityTest, renderAnalyticsReport.
// =============================================================================
task analyticsCompatibilityTest(type: RestIntegTestTask) {
    description = "Runs all PPL ITs through the analytics-engine path. Always succeeds; results " +
            "are post-processed by analyticsCompatibilityReport."
    group = "verification"
    // PPL ITs: both the calcite remote suite and the legacy ppl/ package.
    configureAnalyticsCompatibilityTest(it,
            ["org.opensearch.sql.calcite.remote.*IT", "org.opensearch.sql.ppl.*IT"],
            "analyticsCompatibility")
}

task analyticsSqlCompatibilityTest(type: RestIntegTestTask) {
    description = "Runs all SQL ITs through the analytics-engine path. Always succeeds; results " +
            "are post-processed by analyticsSqlCompatibilityReport."
    group = "verification"
    // SQL ITs live under org.opensearch.sql.sql.* and the legacy SQL suite under
    // org.opensearch.sql.legacy.* — both go through SQLIntegTestCase, which honors
    // the same tests.analytics.force_routing toggle as PPLIntegTestCase.
    configureAnalyticsCompatibilityTest(it,
            ["org.opensearch.sql.sql.*IT", "org.opensearch.sql.legacy.*IT"],
            "analyticsSqlCompatibility")
}

// Cluster log path. The cluster's testcluster log is the only source of server-side stack
// traces — the SQL plugin's REST formatter only sends `type` + `reason` + `details` to the
// client, never the throw-site frame. We need the frame to classify whether a failure is
// from our SQL plugin's Calcite layer, the analytics-engine, the Calcite library itself, or
// OpenSearch core. Override with -PclusterLog=/abs/path/to/cluster.log.
//
// Probes both common locations: the SQL plugin's own integTest-0 cluster (used when
// `:opensearch-sql-plugin:run` brings the cluster up locally), and OpenSearch's runTask-0
// cluster (used when the OpenSearch repo brings the cluster up).
def analyticsClusterLog = project.findProperty('clusterLog') ?: {
    ['plugin/build/testclusters/integTest-0/logs/integTest.log',
     '../OpenSearch/build/testclusters/runTask-0/logs/runTask.log'].collect {
        file("${rootDir}/${it}")
    }.find { it.exists() }?.absolutePath
}()

task analyticsCompatibilityReport {
    description = "Generates a markdown coverage report classifying analyticsCompatibilityTest " +
            "failures by exception type, with messages normalized so per-index/per-field " +
            "variations collapse into a single bucket. Each bucket is annotated with an Origin " +
            "(SQL plugin / analytics engine / Calcite library / OpenSearch / Test) recovered from " +
            "the cluster log's first server-side stack frame."
    group = "verification"
    dependsOn analyticsCompatibilityTest

    // No inputs/outputs declared on purpose: the upstream test task is gated on
    // -Dtests.rest.cluster and may produce no XMLs. Up-to-date checks would
    // suppress the "no results" log line we want users to see.
    doLast {
        renderAnalyticsReport(
                xmlDir: file("$buildDir/test-results/analyticsCompatibility"),
                reportFile: file("$buildDir/reports/analytics-compatibility/REPORT.md"),
                clusterLog: analyticsClusterLog,
                label: "PPL",
                resultsSubdir: "analyticsCompatibility",
                logTag: "analyticsCompatibilityReport",
        )
    }
}

task analyticsSqlCompatibilityReport {
    description = "Generates a markdown coverage report classifying analyticsSqlCompatibilityTest " +
            "failures by exception type, with messages normalized so per-index/per-field " +
            "variations collapse into a single bucket. Each bucket is annotated with an Origin " +
            "(SQL plugin / analytics engine / Calcite library / OpenSearch / Test) recovered from " +
            "the cluster log's first server-side stack frame."
    group = "verification"
    dependsOn analyticsSqlCompatibilityTest

    doLast {
        renderAnalyticsReport(
                xmlDir: file("$buildDir/test-results/analyticsSqlCompatibility"),
                reportFile: file("$buildDir/reports/analytics-sql-compatibility/REPORT.md"),
                clusterLog: analyticsClusterLog,
                label: "SQL",
                resultsSubdir: "analyticsSqlCompatibility",
                logTag: "analyticsSqlCompatibilityReport",
        )
    }
}
